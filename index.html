<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Installer | Expert Auto Repair — Cleveland, OH</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --black: #1A1A1D;
    --black2: #111113;
    --charcoal: #232328;
    --silver: #C0C0C0;
    --silver-dim: #888899;
    --orange: #FF6B35;
    --orange-glow: rgba(255,107,53,0.18);
    --white: #FFFFFF;
    --off-white: #F0F0F0;
    --gold: #F5C842;
    --card-bg: #202024;
    --border: rgba(192,192,192,0.10);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--black);
    color: var(--white);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== NAVBAR ===== */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    height: 64px;
    background: rgba(17,17,19,0.90);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border-bottom: 1px solid var(--border);
    transition: background 0.3s;
  }
  nav.scrolled { background: rgba(17,17,19,0.98); }
  .nav-logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--white);
    text-decoration: none;
  }
  .nav-logo span { color: var(--orange); }
  .nav-phone {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--white);
    text-decoration: none;
    font-size: 0.95rem;
    font-weight: 500;
    letter-spacing: 0.02em;
    transition: color 0.2s;
  }
  .nav-phone:hover { color: var(--orange); }
  .nav-phone-icon {
    width: 32px; height: 32px;
    background: var(--orange);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem;
    flex-shrink: 0;
  }

  /* ===== HERO ===== */
  #hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    padding: 100px 24px 80px;
  }

  /* Dark gradient base */
  .hero-bg {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 40%, #2a2a32 0%, #1A1A1D 55%, #0e0e10 100%);
    z-index: 0;
  }

  /* Moving spotlight streaks */
  .streak {
    position: absolute;
    pointer-events: none;
    z-index: 1;
  }
  .streak-1 {
    top: -10%; left: 15%;
    width: 2px; height: 80vh;
    background: linear-gradient(180deg, transparent 0%, rgba(255,107,53,0.18) 30%, rgba(192,192,192,0.12) 60%, transparent 100%);
    transform: rotate(-22deg);
    transform-origin: top center;
    animation: streakSwing1 9s ease-in-out infinite;
  }
  .streak-2 {
    top: -5%; left: 55%;
    width: 2px; height: 75vh;
    background: linear-gradient(180deg, transparent 0%, rgba(192,192,192,0.1) 30%, rgba(255,107,53,0.08) 70%, transparent 100%);
    transform: rotate(18deg);
    transform-origin: top center;
    animation: streakSwing2 12s ease-in-out infinite;
  }
  .streak-3 {
    top: -15%; left: 80%;
    width: 1px; height: 65vh;
    background: linear-gradient(180deg, transparent 0%, rgba(192,192,192,0.08) 40%, transparent 100%);
    transform: rotate(-8deg);
    transform-origin: top center;
    animation: streakSwing3 15s ease-in-out infinite;
  }
  .streak-4 {
    top: -8%; left: 35%;
    width: 1px; height: 70vh;
    background: linear-gradient(180deg, transparent 0%, rgba(255,107,53,0.10) 45%, transparent 100%);
    transform: rotate(30deg);
    transform-origin: top center;
    animation: streakSwing1 11s ease-in-out infinite reverse;
  }
  @keyframes streakSwing1 {
    0%, 100% { transform: rotate(-22deg) translateX(0); opacity: 0.7; }
    50% { transform: rotate(-10deg) translateX(18px); opacity: 1; }
  }
  @keyframes streakSwing2 {
    0%, 100% { transform: rotate(18deg) translateX(0); opacity: 0.5; }
    50% { transform: rotate(28deg) translateX(-12px); opacity: 0.9; }
  }
  @keyframes streakSwing3 {
    0%, 100% { transform: rotate(-8deg); opacity: 0.4; }
    50% { transform: rotate(2deg); opacity: 0.7; }
  }

  /* Floating particles */
  .particles { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
  .particle {
    position: absolute;
    border-radius: 50%;
    background: rgba(192,192,192,0.25);
    animation: particleDrift linear infinite;
  }
  .particle:nth-child(1)  { width:2px;height:2px; left:10%; top:70%; animation-duration:18s; animation-delay:0s; }
  .particle:nth-child(2)  { width:1px;height:1px; left:25%; top:40%; animation-duration:22s; animation-delay:3s; background: rgba(255,107,53,0.4); }
  .particle:nth-child(3)  { width:2px;height:2px; left:50%; top:85%; animation-duration:16s; animation-delay:1s; }
  .particle:nth-child(4)  { width:1px;height:1px; left:70%; top:30%; animation-duration:25s; animation-delay:5s; }
  .particle:nth-child(5)  { width:2px;height:2px; left:85%; top:65%; animation-duration:20s; animation-delay:2s; background: rgba(255,107,53,0.3); }
  .particle:nth-child(6)  { width:1px;height:1px; left:40%; top:20%; animation-duration:14s; animation-delay:7s; }
  .particle:nth-child(7)  { width:3px;height:3px; left:60%; top:75%; animation-duration:28s; animation-delay:4s; opacity:0.15; }
  .particle:nth-child(8)  { width:1px;height:1px; left:15%; top:50%; animation-duration:19s; animation-delay:9s; background: rgba(255,107,53,0.35); }
  .particle:nth-child(9)  { width:2px;height:2px; left:90%; top:45%; animation-duration:23s; animation-delay:0s; }
  .particle:nth-child(10) { width:1px;height:1px; left:33%; top:90%; animation-duration:17s; animation-delay:6s; }
  .particle:nth-child(11) { width:2px;height:2px; left:75%; top:15%; animation-duration:21s; animation-delay:3s; background: rgba(255,107,53,0.25); }
  .particle:nth-child(12) { width:1px;height:1px; left:5%;  top:25%; animation-duration:26s; animation-delay:11s; }
  @keyframes particleDrift {
    0%   { transform: translateY(0) translateX(0); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 0.6; }
    100% { transform: translateY(-120px) translateX(30px); opacity: 0; }
  }

  /* Orange floor glow */
  .hero-glow {
    position: absolute;
    bottom: -60px; left: 50%;
    transform: translateX(-50%);
    width: 700px; height: 200px;
    background: radial-gradient(ellipse at center, rgba(255,107,53,0.12) 0%, transparent 70%);
    z-index: 1;
    pointer-events: none;
  }

  .hero-content {
    position: relative;
    z-index: 2;
    text-align: center;
    max-width: 820px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .hero-eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 22px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.2s;
  }
  .hero-eyebrow::before,
  .hero-eyebrow::after {
    content: '';
    display: block;
    width: 28px; height: 1px;
    background: var(--orange);
    opacity: 0.6;
  }

  .hero-headline {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.8rem, 7vw, 5.6rem);
    font-weight: 900;
    line-height: 1.07;
    letter-spacing: -0.02em;
    color: var(--white);
    margin-bottom: 24px;
    opacity: 0;
    animation: fadeUp 0.9s ease forwards 0.4s;
  }
  .hero-headline em {
    font-style: normal;
    color: var(--orange);
    position: relative;
  }
  .hero-headline em::after {
    content: '';
    position: absolute;
    bottom: 4px; left: 0; right: 0;
    height: 3px;
    background: var(--orange);
    opacity: 0.3;
    border-radius: 2px;
  }

  .hero-sub {
    font-size: clamp(1rem, 2.5vw, 1.2rem);
    font-weight: 300;
    color: var(--silver);
    line-height: 1.7;
    max-width: 560px;
    margin: 0 auto 44px;
    opacity: 0;
    animation: fadeUp 0.9s ease forwards 0.6s;
  }

  .hero-btns {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 56px;
    opacity: 0;
    animation: fadeUp 0.9s ease forwards 0.8s;
  }

  .btn-primary {
    padding: 16px 36px;
    background: var(--orange);
    color: var(--white);
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    box-shadow: 0 0 28px rgba(255,107,53,0.38), 0 4px 20px rgba(0,0,0,0.4);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 44px rgba(255,107,53,0.55), 0 8px 28px rgba(0,0,0,0.5);
  }
  .btn-secondary {
    padding: 15px 36px;
    background: transparent;
    color: var(--white);
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    border: 1.5px solid rgba(192,192,192,0.35);
    border-radius: 4px;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
  }
  .btn-secondary:hover {
    border-color: var(--orange);
    color: var(--orange);
    background: var(--orange-glow);
  }

  .scroll-indicator {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    opacity: 0;
    animation: fadeUp 1s ease forwards 1.2s;
    margin-top: 0;
  }
  .scroll-indicator span {
    font-size: 0.68rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--silver-dim);
  }
  .scroll-mouse {
    width: 22px; height: 34px;
    border: 1.5px solid rgba(192,192,192,0.3);
    border-radius: 12px;
    display: flex; align-items: flex-start; justify-content: center;
    padding-top: 6px;
  }
  .scroll-dot {
    width: 3px; height: 7px;
    background: var(--orange);
    border-radius: 2px;
    animation: scrollBounce 1.6s ease-in-out infinite;
  }
  @keyframes scrollBounce {
    0%,100% { transform: translateY(0); opacity: 1; }
    50%      { transform: translateY(6px); opacity: 0.4; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ===== STATS BAR ===== */
  #stats {
    background: var(--black2);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 0;
  }
  .stats-inner {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    max-width: 1100px;
    margin: 0 auto;
  }
  .stat-item {
    padding: 36px 24px;
    text-align: center;
    border-right: 1px solid var(--border);
    transition: background 0.3s;
  }
  .stat-item:last-child { border-right: none; }
  .stat-item:hover { background: rgba(255,107,53,0.04); }
  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    font-weight: 900;
    color: var(--orange);
    display: block;
    line-height: 1;
    margin-bottom: 6px;
  }
  .stat-label {
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--silver-dim);
  }

  /* ===== SECTION COMMONS ===== */
  section { padding: 100px 24px; }
  .section-inner { max-width: 1100px; margin: 0 auto; }
  .section-eyebrow {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 12px;
    display: block;
  }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 4.5vw, 3rem);
    font-weight: 700;
    line-height: 1.18;
    color: var(--white);
    margin-bottom: 16px;
  }
  .section-sub {
    font-size: 1rem;
    color: var(--silver-dim);
    max-width: 520px;
    line-height: 1.75;
    margin-bottom: 56px;
  }

  /* fade-in on scroll */
  .reveal {
    opacity: 0;
    transform: translateY(36px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .reveal-delay-1 { transition-delay: 0.1s; }
  .reveal-delay-2 { transition-delay: 0.2s; }
  .reveal-delay-3 { transition-delay: 0.3s; }
  .reveal-delay-4 { transition-delay: 0.4s; }

  /* ===== SERVICES ===== */
  #services { background: var(--black); }
  .services-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
  }
  .service-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 36px 30px 32px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s, transform 0.3s, box-shadow 0.3s;
    cursor: default;
  }
  .service-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--orange);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.35s ease;
  }
  .service-card:hover {
    border-color: rgba(255,107,53,0.3);
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,107,53,0.08);
  }
  .service-card:hover::before { transform: scaleX(1); }
  .service-icon {
    font-size: 2.2rem;
    margin-bottom: 20px;
    display: inline-block;
    animation: iconBob 3.5s ease-in-out infinite;
  }
  .service-card:nth-child(2) .service-icon { animation-delay: 0.5s; }
  .service-card:nth-child(3) .service-icon { animation-delay: 1s; }
  .service-card:nth-child(4) .service-icon { animation-delay: 1.5s; }
  .service-card:nth-child(5) .service-icon { animation-delay: 0.3s; }
  .service-card:nth-child(6) .service-icon { animation-delay: 0.8s; }
  .service-card:nth-child(7) .service-icon { animation-delay: 1.3s; }
  @keyframes iconBob {
    0%,100% { transform: translateY(0); }
    45%      { transform: translateY(-7px); }
    65%      { transform: translateY(-4px); }
  }
  .service-card h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 10px;
  }
  .service-card p {
    font-size: 0.9rem;
    color: var(--silver-dim);
    line-height: 1.7;
  }

  /* ===== WHY CHOOSE US ===== */
  #why { background: var(--charcoal); }
  .why-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
    gap: 24px;
  }
  .why-card {
    background: var(--black);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 40px 32px;
    transition: transform 0.3s, box-shadow 0.3s;
  }
  .why-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 16px 48px rgba(0,0,0,0.55);
  }
  .why-icon-wrap {
    width: 56px; height: 56px;
    background: var(--orange-glow);
    border: 1px solid rgba(255,107,53,0.22);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem;
    margin-bottom: 22px;
    animation: iconBob 4s ease-in-out infinite;
  }
  .why-card:nth-child(2) .why-icon-wrap { animation-delay: 0.7s; }
  .why-card:nth-child(3) .why-icon-wrap { animation-delay: 1.4s; }
  .why-card h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 12px;
  }
  .why-card p {
    font-size: 0.9rem;
    color: var(--silver-dim);
    line-height: 1.75;
  }

  /* ===== REVIEWS ===== */
  #reviews { background: var(--black); }
  .reviews-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 22px;
  }
  .review-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 32px 28px;
    position: relative;
    animation: floatCard 5s ease-in-out infinite;
    transition: box-shadow 0.3s, transform 0.3s;
  }
  .review-card:nth-child(2) { animation-delay: 1.2s; }
  .review-card:nth-child(3) { animation-delay: 2.4s; }
  @keyframes floatCard {
    0%,100% { transform: translateY(0px); box-shadow: 0 4px 24px rgba(0,0,0,0.35); }
    50%      { transform: translateY(-8px); box-shadow: 0 18px 48px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,107,53,0.06); }
  }
  .review-card:hover {
    animation-play-state: paused;
    box-shadow: 0 16px 48px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,107,53,0.15) !important;
  }
  .review-stars { color: var(--gold); font-size: 1.05rem; margin-bottom: 16px; letter-spacing: 2px; }
  .review-text {
    font-size: 0.92rem;
    color: var(--silver);
    line-height: 1.75;
    margin-bottom: 22px;
    font-style: italic;
    position: relative;
  }
  .review-text::before {
    content: '\201C';
    font-family: 'Playfair Display', serif;
    font-size: 3.5rem;
    color: var(--orange);
    opacity: 0.2;
    position: absolute;
    top: -14px; left: -8px;
    line-height: 1;
    pointer-events: none;
  }
  .review-author { font-size: 0.82rem; font-weight: 600; color: var(--white); }
  .review-badge {
    font-size: 0.72rem;
    color: var(--silver-dim);
    margin-top: 2px;
  }
  .google-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 4px;
    font-size: 0.72rem;
    color: var(--silver-dim);
  }
  .google-g {
    width: 16px; height: 16px;
    background: #4285F4;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.6rem;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
  }

  /* ===== CONTACT ===== */
  #contact { background: var(--charcoal); }
  .contact-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 64px;
    align-items: start;
  }
  .contact-info { }
  .contact-info .section-title { margin-bottom: 8px; }
  .contact-info .section-sub { margin-bottom: 36px; }
  .contact-details { display: flex; flex-direction: column; gap: 20px; }
  .contact-detail-item {
    display: flex;
    align-items: flex-start;
    gap: 16px;
  }
  .contact-detail-icon {
    width: 40px; height: 40px;
    background: var(--orange-glow);
    border: 1px solid rgba(255,107,53,0.2);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .contact-detail-label {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 4px;
  }
  .contact-detail-value {
    font-size: 0.95rem;
    color: var(--silver);
    line-height: 1.55;
  }
  .contact-detail-value a {
    color: var(--silver);
    text-decoration: none;
    transition: color 0.2s;
  }
  .contact-detail-value a:hover { color: var(--orange); }

  /* Form */
  .contact-form { display: flex; flex-direction: column; gap: 18px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--silver-dim);
  }
  .form-group input,
  .form-group select,
  .form-group textarea {
    background: var(--black);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px 16px;
    color: var(--white);
    font-family: 'Inter', sans-serif;
    font-size: 0.92rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    appearance: none;
